<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRT AURA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>:root {
  --bg-primary: #0A0A0F;
  --bg-secondary: rgba(15, 15, 25, 0.7);
  --bg-tertiary: rgba(25, 25, 40, 0.5);
  --bg-hover: rgba(40, 40, 60, 0.6);
  --bg-active: rgba(55, 55, 80, 0.7);
  --text-primary: rgba(255, 255, 255, 0.92);
  --text-secondary: rgba(255, 255, 255, 0.6);
  --text-muted: rgba(255, 255, 255, 0.35);
  --accent: #6b8eff;
  --accent-cyan: #00d4ff;
  --accent-purple: #b06aff;
  --accent-hover: #8ba5ff;
  --accent-dark: #4a6fd9;
  --border: rgba(255, 255, 255, 0.06);
  --border-light: rgba(255, 255, 255, 0.12);
  --danger: #ff6b6b;
  --danger-hover: #ff8585;
  --success: #00e5a0;
  --warning: #ffd166;
  --playhead: #00d4ff;
  --waveform-color: #6b8eff;
  --block-bg: rgba(107, 142, 255, 0.25);
  --block-selected: rgba(107, 142, 255, 0.6);
  --glow-blue: rgba(107, 142, 255, 0.4);
  --glow-cyan: rgba(0, 212, 255, 0.3);
  --glow-purple: rgba(176, 106, 255, 0.3);
  --font-sans: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-mono: "JetBrains Mono", "Fira Code", monospace;
  --radius: 24px;
  --radius-sm: 16px;
  --radius-xs: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  user-select: none;
  position: relative;
}

/* === Particle Background === */
#particles-bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; overflow: hidden;
}
#particles-bg .glow-orb {
  position: absolute; border-radius: 50%;
  filter: blur(60px); opacity: 0.15;
  animation: orbFloat 20s ease-in-out infinite;
}
#particles-bg .glow-orb:nth-child(1) {
  width: 300px; height: 300px;
  background: radial-gradient(circle, var(--accent), transparent 70%);
  top: 10%; left: 15%; animation-delay: 0s;
}
#particles-bg .glow-orb:nth-child(2) {
  width: 400px; height: 400px;
  background: radial-gradient(circle, var(--accent-purple), transparent 70%);
  top: 50%; right: 10%; animation-delay: -7s;
}
#particles-bg .glow-orb:nth-child(3) {
  width: 250px; height: 250px;
  background: radial-gradient(circle, var(--accent-cyan), transparent 70%);
  bottom: 15%; left: 40%; animation-delay: -14s;
}
#particles-bg .particle {
  position: absolute; width: 2px; height: 2px;
  background: rgba(107, 142, 255, 0.5);
  border-radius: 50%;
  animation: particleFloat 15s linear infinite;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0,0) scale(1); }
  25% { transform: translate(30px,-20px) scale(1.1); }
  50% { transform: translate(-20px,30px) scale(0.9); }
  75% { transform: translate(20px,20px) scale(1.05); }
}
@keyframes particleFloat {
  0% { transform: translateY(100vh) translateX(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
}

/* === Breathing Glow === */
.breathing-glow {
  position: absolute; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
  opacity: 0.3;
  animation: breatheGlow 3s ease-in-out infinite;
  pointer-events: none; z-index: 1;
}
@keyframes breatheGlow {
  0%, 100% { opacity: 0.15; transform: scaleX(0.8); }
  50% { opacity: 0.5; transform: scaleX(1); }
}

/* === Main container on top of particles === */
body > .toolbar, body > .main, body > .statusbar {
  position: relative; z-index: 2;
}

/* Toolbar - Glassmorphism */
.toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 20px;
  background: rgba(15, 15, 25, 0.6);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0; flex-wrap: wrap;
  box-shadow: 0 4px 30px rgba(0,0,0,0.3);
}
.toolbar button {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary);
  padding: 8px 18px;
  border-radius: var(--radius-xs);
  cursor: pointer;
  font-size: 12px;
  font-weight: 400;
  transition: all 0.3s ease;
  white-space: nowrap;
  font-family: var(--font-sans);
  letter-spacing: 0.5px;
  backdrop-filter: blur(10px);
}
.toolbar button:hover {
  background: rgba(107, 142, 255, 0.15);
  border-color: rgba(107, 142, 255, 0.3);
  color: var(--accent-hover);
  box-shadow: 0 0 15px rgba(107, 142, 255, 0.2);
  transform: translateY(-1px);
}
.toolbar button:active { transform: translateY(0); }
.toolbar .sep {
  width: 1px; height: 20px;
  background: rgba(255,255,255,0.08); margin: 0 6px;
}
.toolbar input[type="number"] {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-primary);
  padding: 6px 12px;
  border-radius: var(--radius-xs);
  width: 56px; font-size: 12px;
  font-family: var(--font-mono);
  backdrop-filter: blur(10px);
}

/* Main */
.main {
  display: flex; flex: 1; overflow: hidden;
  gap: 1px; background: var(--border);
}

/* Left: subtitle list - Glassmorphism */
.left-panel {
  width: 260px; min-width: 200px;
  background: rgba(15, 15, 25, 0.5);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  display: flex; flex-direction: column;
  resize: horizontal; overflow: auto;
  border-right: 1px solid rgba(255,255,255,0.05);
}
.subtitle-list { flex: 1; overflow-y: auto; padding: 10px; }
.subtitle-list::-webkit-scrollbar { width: 4px; }
.subtitle-list::-webkit-scrollbar-track { background: transparent; }
.subtitle-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
.subtitle-item {
  padding: 14px 16px;
  border-radius: var(--radius-xs);
  margin-bottom: 8px;
  border: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  font-size: 13px;
  display: flex; flex-direction: column; gap: 6px;
  transition: all 0.3s ease;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);
}
.subtitle-item:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(107, 142, 255, 0.2);
  transform: translateX(2px);
}
.subtitle-item.selected {
  background: rgba(107, 142, 255, 0.1);
  border-color: rgba(107, 142, 255, 0.4);
  box-shadow: 0 0 20px rgba(107, 142, 255, 0.1), inset 0 0 20px rgba(107, 142, 255, 0.05);
}
.subtitle-item .num {
  font-family: var(--font-mono);
  color: var(--text-muted); font-size: 10px;
  letter-spacing: 1px; font-weight: 300;
}
.subtitle-item .time {
  font-family: var(--font-mono);
  color: var(--accent-cyan); font-size: 10px;
  letter-spacing: 0.5px; font-weight: 300;
}
.subtitle-item .text {
  color: var(--text-primary); line-height: 1.6;
  word-break: break-word; overflow: hidden;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  font-size: 13px; font-weight: 300;
}

/* Center: editor */
.center-panel {
  flex: 1; display: flex; flex-direction: column;
  background: rgba(10, 10, 15, 0.3);
  overflow: hidden; position: relative;
}
.editor-workspace {
  flex: 1; display: flex; flex-direction: column;
  padding: 24px 32px; overflow-y: auto;
}
.editor-workspace::-webkit-scrollbar { width: 4px; }
.editor-workspace::-webkit-scrollbar-track { background: transparent; }
.editor-workspace::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
.editor-header {
  font-size: 18px; color: var(--text-primary);
  margin-bottom: 20px; letter-spacing: 1px;
  font-weight: 200; display: flex; align-items: center; gap: 12px;
}
.editor-header .seq-num {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--accent-cyan);
  background: rgba(0, 212, 255, 0.08);
  padding: 4px 10px; border-radius: 20px;
  font-weight: 300; border: 1px solid rgba(0, 212, 255, 0.15);
}
.editor-row { display: flex; gap: 20px; margin-bottom: 18px; }
.editor-label {
  font-size: 11px; color: var(--text-muted);
  margin-bottom: 8px; letter-spacing: 1.5px;
  text-transform: uppercase; font-weight: 300;
}
.editor-row .editor-group { flex: 1; }
.editor-row input, .editor-row textarea, .editor-group input, .editor-group textarea {
  width: 100%; background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  color: var(--text-primary); padding: 14px 16px;
  border-radius: var(--radius-xs); font-size: 14px;
  font-family: var(--font-mono); transition: all 0.3s ease;
  backdrop-filter: blur(10px); font-weight: 300;
}
.editor-row input:focus, .editor-row textarea:focus, .editor-group input:focus, .editor-group textarea:focus {
  outline: none; border-color: rgba(107, 142, 255, 0.4);
  box-shadow: 0 0 20px rgba(107, 142, 255, 0.1), inset 0 0 20px rgba(107, 142, 255, 0.02);
  background: rgba(255,255,255,0.05);
}
.editor-row textarea, .editor-group textarea {
  resize: vertical; min-height: 120px; line-height: 1.8;
  font-family: var(--font-sans); font-size: 15px;
  font-weight: 300;
}
.editor-actions {
  display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap;
}
.editor-actions button {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary);
  padding: 8px 16px; border-radius: var(--radius-xs);
  cursor: pointer; font-size: 12px;
  transition: all 0.3s ease; font-weight: 300;
  letter-spacing: 0.5px; backdrop-filter: blur(10px);
}
.editor-actions button:hover {
  background: rgba(107, 142, 255, 0.15);
  border-color: rgba(107, 142, 255, 0.3);
  color: var(--accent-hover);
  box-shadow: 0 0 15px rgba(107, 142, 255, 0.15);
}
.editor-actions button.danger:hover {
  background: rgba(255, 107, 107, 0.15);
  border-color: rgba(255, 107, 107, 0.3);
  color: var(--danger-hover);
  box-shadow: 0 0 15px rgba(255, 107, 107, 0.15);
}
.editor-empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; color: var(--text-muted);
  font-size: 15px; font-weight: 200; letter-spacing: 1px;
}
.editor-empty-state .glow-icon {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(107, 142, 255, 0.1);
  border: 1px solid rgba(107, 142, 255, 0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; box-shadow: 0 0 30px rgba(107, 142, 255, 0.1);
  animation: pulseGlow 4s ease-in-out infinite;
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(107, 142, 255, 0.1); }
  50% { box-shadow: 0 0 40px rgba(107, 142, 255, 0.25); }
}
.editor-empty-state .desc { font-size: 13px; letter-spacing: 0.5px; }

/* Right: timeline */
.right-panel {
  width: 300px; min-width: 240px;
  background: rgba(15, 15, 25, 0.5);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  display: flex; flex-direction: column;
  border-left: 1px solid rgba(255,255,255,0.05);
}
.right-panel-header {
  padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05);
  font-family: var(--font-sans); font-size: 13px; font-weight: 200;
  letter-spacing: 2px; color: var(--text-secondary);
  text-transform: uppercase;
}
.timeline-container {
  flex: 1; overflow: hidden; position: relative;
  background: rgba(10, 10, 15, 0.3);
}
.timeline-container.empty {
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  font-size: 14px; font-weight: 200; letter-spacing: 1px;
}
.timeline-info {
  padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.05);
  font-size: 12px; color: var(--text-muted); font-weight: 300;
}
.timeline-info-row {
  display: flex; justify-content: space-between;
  margin-bottom: 8px; letter-spacing: 0.5px;
}
.timeline-current {
  font-family: var(--font-mono); color: var(--accent-cyan);
  font-weight: 300; font-size: 13px;
}

/* Status bar */
.statusbar {
  padding: 8px 24px;
  background: rgba(15, 15, 25, 0.6);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-top: 1px solid rgba(255,255,255,0.05);
  font-size: 11px; color: var(--text-muted); font-weight: 300;
  display: flex; justify-content: space-between; align-items: center;
  letter-spacing: 0.5px; flex-shrink: 0;
}
.statusbar .status-right { font-family: var(--font-mono); }

/* Toast */
.toast-container {
  position: fixed; bottom: 32px; right: 32px;
  z-index: 10000; pointer-events: none;
}
.toast {
  background: rgba(15, 15, 25, 0.8);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  color: var(--text-primary); padding: 14px 28px;
  border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(107, 142, 255, 0.1);
  font-size: 13px; font-weight: 300;
  animation: toastIn 0.4s ease, toastOut 0.4s ease 2.6s;
  margin-bottom: 10px; letter-spacing: 0.5px;
  pointer-events: auto;
}
.toast-success { border-color: rgba(0, 229, 160, 0.3); }
.toast-error { border-color: rgba(255, 107, 107, 0.3); }
.toast-warning { border-color: rgba(255, 209, 102, 0.3); }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateY(0) scale(1); }
  to { opacity: 0; transform: translateY(-10px) scale(0.95); }
}

/* Modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px); z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal-content {
  background: rgba(15, 15, 25, 0.85);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  width: 560px; max-width: 90vw;
  max-height: 80vh; display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(107, 142, 255, 0.05);
  transform: translateY(20px) scale(0.98); transition: transform 0.3s ease;
  overflow: hidden;
}
.modal-overlay.open .modal-content { transform: translateY(0) scale(1); }
.modal-header {
  padding: 24px 28px; font-size: 16px; font-weight: 200;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; justify-content: space-between; align-items: center;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-secondary);
}
.modal-header .close-btn {
  background: transparent; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 20px; padding: 0; width: 32px; height: 32px;
  border-radius: 50%; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
}
.modal-header .close-btn:hover {
  background: rgba(255,255,255,0.05); color: var(--text-primary);
  transform: rotate(90deg);
}
.modal-body { padding: 20px 28px; overflow-y: auto; flex: 1; }
.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-track { background: transparent; }
.modal-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

/* Verify panel */
.verify-container { display: flex; flex-direction: column; gap: 14px; }
.verify-item {
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: var(--radius-xs); padding: 18px;
  background: rgba(255,255,255,0.02); transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}
.verify-item:hover {
  border-color: rgba(107, 142, 255, 0.15);
  box-shadow: 0 0 15px rgba(107, 142, 255, 0.05);
  transform: translateY(-1px);
}
.verify-item .term {
  color: var(--accent); font-family: var(--font-mono);
  font-size: 13px; font-weight: 400; margin-bottom: 8px;
  letter-spacing: 0.5px;
}
.verify-item .context { color: var(--text-secondary); font-size: 13px; margin-bottom: 10px; line-height: 1.6; font-weight: 300; }
.verify-item .context b { color: var(--accent); font-weight: 400; }
.verify-item .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
.verify-item .btn-group button {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary); padding: 6px 14px; border-radius: 6px; cursor: pointer;
  font-size: 12px; transition: all 0.3s ease; font-weight: 300; letter-spacing: 0.5px;
  backdrop-filter: blur(10px);
}
.verify-item .btn-group button:hover {
  background: rgba(107, 142, 255, 0.15); border-color: rgba(107, 142, 255, 0.3);
  color: var(--accent-hover); box-shadow: 0 0 10px rgba(107, 142, 255, 0.1);
}
.verify-item .btn-group button.ignore:hover {
  background: rgba(255, 209, 102, 0.1); border-color: rgba(255, 209, 102, 0.3);
  color: var(--warning); box-shadow: 0 0 10px rgba(255, 209, 102, 0.1);
}
.verify-item .btn-group button.primary {
  background: rgba(107, 142, 255, 0.15); border-color: rgba(107, 142, 255, 0.3);
  color: var(--accent);
}
.verify-item .btn-group button.primary:hover {
  background: rgba(107, 142, 255, 0.25);
  box-shadow: 0 0 15px rgba(107, 142, 255, 0.2);
}

/* Add rule form at top */
.add-rule-form {
  border: 1px solid rgba(107, 142, 255, 0.15);
  border-radius: var(--radius-xs); padding: 20px;
  background: rgba(107, 142, 255, 0.04); margin-bottom: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(107, 142, 255, 0.05), inset 0 0 20px rgba(107, 142, 255, 0.02);
}
.add-rule-form .form-title {
  color: var(--accent); font-size: 13px; font-weight: 400;
  margin-bottom: 14px; letter-spacing: 1px; text-transform: uppercase;
}
.add-rule-form .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.add-rule-form .form-row input {
  flex: 1; min-width: 140px; background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06); color: var(--text-primary);
  padding: 10px 14px; border-radius: var(--radius-xs); font-size: 13px; font-family: var(--font-mono);
  transition: all 0.3s ease; font-weight: 300;
}
.add-rule-form .form-row input:focus {
  outline: none; border-color: rgba(107, 142, 255, 0.4);
  box-shadow: 0 0 15px rgba(107, 142, 255, 0.1);
  background: rgba(255,255,255,0.05);
}
.add-rule-form .form-row button {
  background: rgba(107, 142, 255, 0.2); border: 1px solid rgba(107, 142, 255, 0.3);
  color: var(--accent); padding: 10px 20px; border-radius: var(--radius-xs);
  cursor: pointer; font-size: 12px; font-weight: 400; letter-spacing: 1px;
  transition: all 0.3s ease; text-transform: uppercase;
}
.add-rule-form .form-row button:hover {
  background: rgba(107, 142, 255, 0.3);
  box-shadow: 0 0 20px rgba(107, 142, 255, 0.2);
  transform: translateY(-1px);
}

/* Rules panel */
.rules-section { margin-bottom: 20px; }
.rules-section-title {
  font-size: 12px; font-weight: 300; color: var(--text-muted);
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px;
  padding-left: 4px;
}
.rules-list { display: flex; flex-direction: column; gap: 6px; }
.rule-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border-radius: var(--radius-xs); font-size: 12px; font-weight: 300;
  background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
  transition: all 0.3s ease; letter-spacing: 0.3px;
  backdrop-filter: blur(10px);
}
.rule-item:hover {
  background: rgba(255,255,255,0.04);
  border-color: rgba(255,255,255,0.08);
  transform: translateX(2px);
}
.rule-item.disabled { opacity: 0.4; text-decoration: line-through; }
.rule-item .toggle {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2); cursor: pointer; flex-shrink: 0;

.rule-item .delete-btn:hover { color: var(--danger); background: rgba(255, 107, 107, 0.1); transform: rotate(90deg); }

/* Ignored list */

<script>
(function(){
'use strict';

// ==================== STATE ====================
let subtitles = [];
let audioBuffer = null, duration = 0, audioCtx = null, audioSource = null;
let selectedIndex = -1;
let customRules = [];
let disabledBuiltinIndices = new Set();
let ignoredTerms = new Set();
let history = [], historyIndex = -1;
let currentVerifyItem = null;
let isPlaying = false, playStartTime = 0, playOffset = 0;
let zoom = 1, panOffset = 0;
let waveformData = null;

// ==================== DOM REFS ====================
const $ = id => document.getElementById(id);
const subtitleList = $('subtitleList');
const timelineContainer = $('timelineSection');
const waveformCanvas = $('waveformCanvas');
const ctx2d = waveformCanvas.getContext('2d');
const statusText = $('statusText');
const toastContainer = $('toastContainer');
const editorEmptyState = $('editorEmptyState');
const editorContent = $('editorContent');
const editorSeqNum = $('editorSeqNum');
const editorStartTime = $('editorStartTime');
const editorEndTime = $('editorEndTime');
const editorText = $('editorText');
const timelineInfo = $('timelineInfo');
const timelineCurrent = $('timelineCurrent');

// ==================== UTILS ====================
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  toastContainer.appendChild(t);
  setTimeout(() => { t.remove(); }, 2500);
}

function timeToMs(t) {
  const m = t.match(/(\d+):(\d+):(\d+)[,.](\d{3})/);
  if (!m) return 0;
  return (+m[1])*3600000 + (+m[2])*60000 + (+m[3])*1000 + (+m[4]);
}

function msToTime(ms) {
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  const cs = Math.floor(ms%1000);
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+','+String(cs).padStart(3,'0');
}

function saveHistory() {
  if (historyIndex < history.length-1) history = history.slice(0, historyIndex+1);
  history.push(JSON.stringify(subtitles));
  if (history.length > 50) history.shift();
  else historyIndex++;
}

function undo() {
  if (historyIndex > 0) {
    historyIndex--;
    subtitles = JSON.parse(history[historyIndex]);
    renderSubtitles();
    renderTimeline();
    toast('已撤销');
  }
}

function redo() {
  if (historyIndex < history.length-1) {
    historyIndex++;
    subtitles = JSON.parse(history[historyIndex]);
    renderSubtitles();
    renderTimeline();
    toast('已重做');
  }
}

// ==================== SRT PARSE / EXPORT ====================
function parseSRT(text) {
  const subs = [];
  const blocks = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n\n');
  let idx = 1;
  for (const block of blocks) {
    const lines = block.trim().split('\n');
    if (lines.length < 2) continue;
    const timeLine = lines.find(l => l.includes('-->'));
    if (!timeLine) continue;
    const [s,e] = timeLine.split('-->').map(t => t.trim());
    const textLines = lines.slice(lines.indexOf(timeLine)+1);
    subs.push({index: idx++, start: timeToMs(s), end: timeToMs(e), text: textLines.join('\n')});
  }
  return subs;
}

function exportSRT() {
  return subtitles.map((sub,i) => {
    return (i+1) + '\n' + msToTime(sub.start) + ' --> ' + msToTime(sub.end) + '\n' + sub.text + '\n';
  }).join('\n');
}

// ==================== RENDER ====================
function renderSubtitles() {
  subtitleList.innerHTML = '';
  if (!subtitles.length) {
    statusText.textContent = '0 条字幕';
    return;
  }
  for (let i = 0; i < subtitles.length; i++) {
    const sub = subtitles[i];
    const el = document.createElement('div');
    el.className = 'subtitle-item' + (i===selectedIndex?' selected':'');
    el.innerHTML = '<span class="num">#'+sub.index+'</span><span class="time">'+msToTime(sub.start)+' --> '+msToTime(sub.end)+'</span><span class="text">'+escapeHtml(sub.text)+'</span>';
    el.addEventListener('click', () => { selectSubtitle(i); });
    el.addEventListener('dblclick', () => { openEditModal(i); });
    el.addEventListener('contextmenu', e => { e.preventDefault(); showContextMenu(e, i); });
    subtitleList.appendChild(el);
  }
  statusText.textContent = subtitles.length + ' 条字幕';
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function selectSubtitle(i) {
  selectedIndex = i;
  const items = subtitleList.querySelectorAll('.subtitle-item');
  items.forEach((el, idx) => el.classList.toggle('selected', idx===i));
  if (i>=0 && i<subtitles.length) {
    items[i]?.scrollIntoView({behavior:'smooth', block:'center'});
  }
  renderCenterEditor();
  renderTimeline();
  renderTimelineInfo();
}

function renderTimeline() {
  var dpr = window.devicePixelRatio || 1;
  var W = timelineContainer.clientWidth;
  var H = timelineContainer.clientHeight;
  
  if (waveformCanvas.width !== W * dpr || waveformCanvas.height !== H * dpr) {
    waveformCanvas.width = W * dpr;
    waveformCanvas.height = H * dpr;
  }
  ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx2d.clearRect(0, 0, W, H);
  
  if (!subtitles.length && !duration) {
    ctx2d.fillStyle = 'var(--text-muted)';
    ctx2d.font = '14px var(--font-serif)';
    ctx2d.textAlign = 'center';
    ctx2d.fillText('拖放音频文件或点击导入', W/2, H/2);
    return;
  }
  
  var maxEnd = Math.max.apply(null, subtitles.map(function(s){ return s.end; }).concat(duration*1000||0));
  if (!maxEnd) return;
  
  ctx2d.fillStyle = 'var(--bg-primary)';
  ctx2d.fillRect(0, 0, W, H);
  
  var totalMs = maxEnd;
  var contentWidth = W * zoom;
  
  // 波形区域
  var waveformHeight = H * 0.35;
  var waveformY = H * 0.08;
  
  if (waveformData && waveformData.length > 0) {
    var samplesPerPx = waveformData.length / contentWidth;
    var startSample = Math.floor(panOffset / contentWidth * waveformData.length);
    
    ctx2d.fillStyle = 'var(--waveform-color)';
    
    for (var x = 0; x < W; x++) {
      var sampleIdx = Math.floor(startSample + x * samplesPerPx);
      if (sampleIdx >= 0 && sampleIdx < waveformData.length) {
        var amp = waveformData[sampleIdx];
        var barHeight = amp * waveformHeight;
        var y = waveformY + (waveformHeight - barHeight) / 2;
        ctx2d.globalAlpha = 0.5 + amp * 0.5;
        ctx2d.fillRect(x, y, 1, barHeight);
      }
    }
    ctx2d.globalAlpha = 1;
  }
  
  // 中心线
  ctx2d.strokeStyle = 'var(--border)';
  ctx2d.lineWidth = 1;
  ctx2d.beginPath();
  ctx2d.moveTo(0, waveformY + waveformHeight/2);
  ctx2d.lineTo(W, waveformY + waveformHeight/2);
  ctx2d.stroke();
  
  // 字幕块
  var blockY = H * 0.55;
  var blockHeight = H * 0.35;
  subtitles.forEach(function(sub, i) {
    var x = (sub.start / totalMs) * contentWidth - panOffset;
    var w = ((sub.end - sub.start) / totalMs) * contentWidth;
    if (x + w < 0 || x > W) return;
    
    var isSelected = i === selectedIndex;
    var currentTime = isPlaying ? (playOffset + Date.now() - playStartTime) : playOffset;
    var isActive = currentTime >= sub.start && currentTime <= sub.end;
    
    ctx2d.fillStyle = isActive ? 'var(--accent)' : (isSelected ? 'var(--block-selected)' : 'var(--block-bg)');
    ctx2d.globalAlpha = isActive ? 0.9 : (isSelected ? 0.8 : 0.6);
    ctx2d.fillRect(Math.max(0, x), blockY, Math.max(2, w), blockHeight);
    ctx2d.globalAlpha = 1;
    
    if (w > 30) {
      ctx2d.fillStyle = '#fff';
      ctx2d.font = '10px sans-serif';
      var txt = sub.text.replace(/\n/g,' ').slice(0, Math.floor(w/5));
      ctx2d.fillText(txt, Math.max(4, x+4), blockY + blockHeight/2 + 4);
    }
  });
  
  // 标尺
  var secInterval = Math.max(1, Math.floor(5 / zoom));
  for (var sec = 0; sec <= totalMs/1000 + 1; sec += secInterval) {
    var x = (sec * 1000 / totalMs) * contentWidth - panOffset;
    if (x < -40 || x > W+10) continue;
    ctx2d.strokeStyle = 'var(--border)';
    ctx2d.lineWidth = 1;
    ctx2d.beginPath();
    ctx2d.moveTo(x, 0);
    ctx2d.lineTo(x, H);
    ctx2d.stroke();
    ctx2d.fillStyle = 'var(--text-muted)';
    ctx2d.font = '10px var(--font-mono)';
    ctx2d.fillText(Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0'), x+2, 12);
  }
  
  // 播放头
  var currentTime = isPlaying ? (playOffset + Date.now() - playStartTime) : playOffset;
  var px = (currentTime / totalMs) * contentWidth - panOffset;
  if (px >= 0 && px <= W) {
    ctx2d.strokeStyle = 'var(--playhead)';
    ctx2d.lineWidth = 2;
    ctx2d.beginPath();
    ctx2d.moveTo(px, 0);
    ctx2d.lineTo(px, H);
    ctx2d.stroke();
    
    ctx2d.fillStyle = 'var(--playhead)';
    ctx2d.beginPath();
    ctx2d.moveTo(px, 0);
    ctx2d.lineTo(px-6, 10);
    ctx2d.lineTo(px+6, 10);
    ctx2d.closePath();
    ctx2d.fill();
  }
}

// ==================== CENTER EDITOR ====================
function renderCenterEditor() {
  if (selectedIndex < 0 || selectedIndex >= subtitles.length) {
    editorEmptyState.style.display = 'flex';
    editorContent.style.display = 'none';
    return;
  }
  editorEmptyState.style.display = 'none';
  editorContent.style.display = 'flex';
  const sub = subtitles[selectedIndex];
  editorSeqNum.textContent = '#' + sub.index;
  editorStartTime.value = msToTime(sub.start);
  editorEndTime.value = msToTime(sub.end);
  editorText.value = sub.text;
}

function saveCenterEditor() {
  if (selectedIndex < 0) return;
  saveHistory();
  const sub = subtitles[selectedIndex];
  sub.start = timeToMs(editorStartTime.value);
  sub.end = timeToMs(editorEndTime.value);
  sub.text = editorText.value;
  renderSubtitles();
  renderTimeline();
  renderTimelineInfo();
  toast('已保存');
}

function renderTimelineInfo() {
  if (!subtitles.length) { timelineInfo.innerHTML = ''; return; }
  const sub = selectedIndex >= 0 ? subtitles[selectedIndex] : null;
  let html = '<div class="timeline-info-item"><div class="label">总字幕数</div><div>' + subtitles.length + ' 条</div></div>';
  if (sub) {
    html += '<div class="timeline-info-item"><div class="label">当前字幕</div><div>#' + sub.index + '</div></div>';
    html += '<div class="timeline-info-item"><div class="label">时长</div><div>' + ((sub.end-sub.start)/1000).toFixed(2) + 's</div></div>';
    html += '<div class="timeline-info-item"><div class="label">字数</div><div>' + sub.text.replace(/\n/g,'').length + ' 字</div></div>';
  }
  timelineInfo.innerHTML = html;
}

// ==================== AUTO SPACE ====================
function autoSpace(text) {
  return text.replace(/([\u4e00-\u9fa5])([a-zA-Z0-9])/g,'$1 $2').replace(/([a-zA-Z0-9])([\u4e00-\u9fa5])/g,'$1 $2');
}

function applyAutoSpace() {
  if (!subtitles.length) return;
  saveHistory();
  subtitles.forEach(sub => { sub.text = autoSpace(sub.text); });
  renderSubtitles();
  toast('已自动添加空格');
}

function getActiveRules() {
  const rules = [];
  BUILTIN_RULES.forEach((r,i) => { if (r.enabled && !disabledBuiltinIndices.has(i)) rules.push(r); });
  rules.push(...customRules.filter(r => r.enabled !== false));
  return rules;
}

function applyTermFix() {
  if (!subtitles.length) return;
  saveHistory();
  const rules = getActiveRules();
  subtitles.forEach(sub => {
    rules.forEach(rule => {
      const re = new RegExp('\\b' + rule.pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi');
      sub.text = sub.text.replace(re, rule.replacement);
    });
  });
  renderSubtitles();
  toast('已修正术语');
}

// ==================== SMART SPLIT ====================
function smartSplit(maxChars) {
  if (!subtitles.length) return;
  saveHistory();
  const newSubs = [];
  let idx = 1;
  subtitles.forEach(sub => {
    const lines = sub.text.split('\\n');
    const chunks = [];
    lines.forEach(line => {
      if (line.length <= maxChars) { chunks.push(line); return; }
      let start = 0;
      while (start < line.length) {
        let end = Math.min(start + maxChars, line.length);
        if (end < line.length) {
          const breaks = ['，','。','！','？','；','：','、',' '];
          let best = -1;
          for (const b of breaks) { const p = line.lastIndexOf(b, end); if (p > start) best = Math.max(best, p); }
          if (best > start) end = best + 1;
        }
        chunks.push(line.slice(start, end));
        start = end;
      }
    });
    const duration = sub.end - sub.start;
    const perChunk = duration / Math.max(1, chunks.length);
    chunks.forEach((chunk, i) => {
      newSubs.push({index: idx++, start: Math.round(sub.start + i*perChunk), end: Math.round(sub.start + (i+1)*perChunk), text: chunk.trim()});
    });
  });
  subtitles = newSubs;
  renderSubtitles();
  renderTimeline();
  toast('已智能拆分');
}

function scanForUnknownTerms() {
  const unknowns = [];
  const knownPatterns = new Set(getActiveRules().map(r => r.pattern.toLowerCase()));
  subtitles.forEach(sub => {
    const matches = sub.text.match(/[a-zA-Z][a-zA-Z0-9]*/g);
    if (!matches) return;
    for (const match of matches) {
      const lower = match.toLowerCase();
      if (knownPatterns.has(lower) || COMMON_WORDS.has(lower) || match.length < 3) continue;
      if (ignoredTerms.has(lower)) continue;
      unknowns.push({term: match, index: sub.index, context: sub.text});
    }
  });
  return unknowns;
}

function renderVerifyResults() {
  const container = $('verifyResults');
  const unknowns = scanForUnknownTerms();
  $('verifyCount').textContent = '发现 ' + unknowns.length + ' 个潜在问题';
  if (!unknowns.length) { container.innerHTML = ''; $('verifyEmpty').style.display = 'block'; return; }
  $('verifyEmpty').style.display = 'none';
  container.innerHTML = '';
  unknowns.forEach(u => {
    const el = document.createElement('div');
    el.className = 'verify-item';
    el.innerHTML = '<div class="term-line"><span class="term">' + escapeHtml(u.term) + '</span><span>字幕 #' + u.index + '</span></div>' +
      '<div class="context">' + escapeHtml(u.context) + '</div>' +
      '<div class="links">' +
      '<a href="https://www.google.com/search?q=' + encodeURIComponent(u.term) + '" target="_blank">Google</a>' +
      '<a href="https://cn.bing.com/search?q=' + encodeURIComponent(u.term) + '" target="_blank">Bing</a>' +
      '<a href="https://zh.wikipedia.org/wiki/' + encodeURIComponent(u.term) + '" target="_blank">Wikipedia</a>' +
      '<button class="add-rule-btn" data-term="' + escapeHtml(u.term) + '">添加规则</button>' +
      '<button class="ignore-btn" data-term="' + escapeHtml(u.term) + '">忽略</button></div>';
    container.appendChild(el);
  });
  container.querySelectorAll('.add-rule-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const term = btn.dataset.term;
      $('customRulePattern').value = term;
      $('customRuleReplacement').value = term.charAt(0).toUpperCase() + term.slice(1);
      $('customRulePattern').focus();
    });
  });
  container.querySelectorAll('.ignore-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      ignoredTerms.add(btn.dataset.term.toLowerCase());
      saveStorage();
      renderVerifyResults();
      renderIgnoredList();
      toast('已忽略该术语');
    });
  });
}

function renderIgnoredList() {
  const list = $('ignoredList');
  const arr = [...ignoredTerms];
  $('ignoredCount').textContent = '已忽略 ' + arr.length + ' 个术语';
  if (!arr.length) { list.innerHTML = ''; return; }
  list.innerHTML = arr.map(t => '<div class="ignored-item"><span class="term">' + escapeHtml(t) + '</span><button data-term="' + escapeHtml(t) + '">恢复</button></div>').join('');
  list.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      ignoredTerms.delete(btn.dataset.term);
      saveStorage();
      renderVerifyResults();
      renderIgnoredList();
      toast('已恢复该术语');
    });
  });
}

  a.href = url; a.download = 'srt-rules.json'; a.click();
  URL.revokeObjectURL(url);
  toast('已导出规则');
});

$('importRulesInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.builtinDisabled) disabledBuiltinIndices = new Set(data.builtinDisabled);
      if (data.custom) customRules = data.custom;
      if (data.ignored) ignoredTerms = new Set(data.ignored);
      saveStorage(); renderRulesList(); renderVerifyResults(); renderIgnoredList();
      toast('已导入规则');
    } catch { toast('导入失败'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

$('btnResetRules').addEventListener('click', () => {
  disabledBuiltinIndices.clear(); customRules = []; ignoredTerms.clear();
  saveStorage(); renderRulesList(); renderVerifyResults(); renderIgnoredList();
  toast('已重置规则');
});

// ==================== STORAGE ====================
function loadStorage() {
  try {
    const c = localStorage.getItem('srt_custom_rules');
    if (c) customRules = JSON.parse(c);
    const d = localStorage.getItem('srt_disabled_builtin');
    if (d) disabledBuiltinIndices = new Set(JSON.parse(d));
    const i = localStorage.getItem('srt_ignored_terms');
    if (i) ignoredTerms = new Set(JSON.parse(i));
  } catch(e) {}
}
function saveStorage() {
  localStorage.setItem('srt_custom_rules', JSON.stringify(customRules));
  localStorage.setItem('srt_disabled_builtin', JSON.stringify([...disabledBuiltinIndices]));
  localStorage.setItem('srt_ignored_terms', JSON.stringify([...ignoredTerms]));
}

// ==================== CONTEXT MENU ====================
const contextMenu = $('contextMenu');
let contextMenuIndex = -1;
function showContextMenu(e, i) {
  contextMenuIndex = i;
  contextMenu.style.display = 'block';
  contextMenu.style.left = Math.min(e.clientX, window.innerWidth - 150) + 'px';
  contextMenu.style.top = Math.min(e.clientY, window.innerHeight - 120) + 'px';
}
document.addEventListener('click', () => { contextMenu.style.display = 'none'; });
$('ctxEdit').addEventListener('click', () => { if (contextMenuIndex>=0) openEditModal(contextMenuIndex); });
$('ctxVerify').addEventListener('click', () => { if (contextMenuIndex>=0) { selectSubtitle(contextMenuIndex); openVerifyModal(); } });
$('ctxSplit').addEventListener('click', () => { if (contextMenuIndex>=0) { selectedIndex = contextMenuIndex; saveHistory(); const sub = subtitles[contextMenuIndex]; const mid = Math.round((sub.start+sub.end)/2); const half = Math.ceil(sub.text.length/2); const newSub = {index: contextMenuIndex+2, start: mid, end: sub.end, text: sub.text.slice(half)}; sub.end = mid; sub.text = sub.text.slice(0, half); subtitles.splice(contextMenuIndex+1, 0, newSub); subtitles.forEach((s,i) => s.index = i+1); renderSubtitles(); renderTimeline(); renderCenterEditor(); renderTimelineInfo(); toast('已拆分'); } });
$('ctxDelete').addEventListener('click', () => { if (contextMenuIndex>=0) { selectedIndex = contextMenuIndex; saveHistory(); subtitles.splice(contextMenuIndex, 1); subtitles.forEach((s,i) => s.index = i+1); selectedIndex = -1; renderSubtitles(); renderTimeline(); renderCenterEditor(); renderTimelineInfo(); toast('已删除'); } });

// ==================== AUDIO ====================
$('btnImportAudio').addEventListener('click', () => $('audioInput').click());
$('audioInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const arrayBuffer = ev.target.result;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.decodeAudioData(arrayBuffer, function(buffer) {
      audioBuffer = buffer; duration = buffer.duration;
      extractWaveform(buffer);
      timelineContainer.classList.remove('empty');
      renderTimeline();
      toast('音频已加载: ' + file.name);
    }, function() { toast('音频解码失败'); });
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
});

$('btnPlay').addEventListener('click', () => {
  if (!audioBuffer || !audioCtx) return;
  if (isPlaying) { audioSource?.stop(); isPlaying = false; renderTimeline(); return; }
  audioSource = audioCtx.createBufferSource();
  audioSource.buffer = audioBuffer;
  audioSource.connect(audioCtx.destination);
  audioSource.start(0, playOffset / 1000);
  playStartTime = Date.now(); isPlaying = true;
  renderTimeline();
  audioSource.onended = () => { isPlaying = false; playOffset = 0; renderTimeline(); };
});

$('btnStop').addEventListener('click', () => {
  if (audioSource) { try { audioSource.stop(); } catch(e) {} }
  isPlaying = false; playOffset = 0; renderTimeline();
});

// ==================== FILE IO ====================
$('btnImportSRT').addEventListener('click', () => $('fileInput').click());
$('fileInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    subtitles = parseSRT(ev.target.result);
    saveHistory(); renderSubtitles(); renderTimeline(); renderCenterEditor(); renderTimelineInfo();
    toast('已加载: ' + file.name);
  };
  reader.readAsText(file);
  e.target.value = '';
});

$('btnExport').addEventListener('click', () => {
  if (!subtitles.length) { toast('没有字幕可导出'); return; }
  const blob = new Blob([exportSRT()], {type: 'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'subtitles.srt'; a.click();
  URL.revokeObjectURL(url);
  toast('已导出 SRT');
});

// ==================== TOOLBAR BUTTONS ====================
$('btnAutoSpace').addEventListener('click', applyAutoSpace);
$('btnTermFix').addEventListener('click', applyTermFix);
$('btnSmartSplit').addEventListener('click', () => smartSplit(+$('maxChars').value));
$('btnVerify').addEventListener('click', openVerifyModal);
$('btnRules').addEventListener('click', openRulesModal);
$('btnUndo').addEventListener('click', undo);
$('btnRedo').addEventListener('click', redo);
$('btnScanBottom').addEventListener('click', openVerifyModal);
$('btnRulesBottom').addEventListener('click', openRulesModal);
$('btnTermFixBottom').addEventListener('click', applyTermFix);
$('btnAutoSpaceBottom').addEventListener('click', applyAutoSpace);
$('btnExecSplit').addEventListener('click', () => smartSplit(+$('maxCharsBottom').value));

// ==================== DRAG & DROP IMPORT ====================
const dragOverlay = $('dragOverlay');
['dragenter','dragover'].forEach(ev => {
  document.addEventListener(ev, e => { e.preventDefault(); dragOverlay.classList.add('show'); });
});
['dragleave','drop'].forEach(ev => {
  document.addEventListener(ev, e => { if (e.target === dragOverlay) dragOverlay.classList.remove('show'); });
});
document.addEventListener('drop', e => {
  e.preventDefault();
  dragOverlay.classList.remove('show');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  if (file.name.endsWith('.json')) {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.builtinDisabled) disabledBuiltinIndices = new Set(data.builtinDisabled);
        if (data.custom) customRules = data.custom;
        if (data.ignored) ignoredTerms = new Set(data.ignored);
        saveStorage(); renderRulesList(); renderVerifyResults(); renderIgnoredList();
        toast('已导入规则');
      } catch { toast('JSON 解析失败'); }
    };
    reader.readAsText(file);
  } else if (file.name.endsWith('.srt')) {
    const reader = new FileReader();
    reader.onload = ev => { subtitles = parseSRT(ev.target.result); saveHistory(); renderSubtitles(); renderTimeline(); renderCenterEditor(); renderTimelineInfo(); toast('已加载 SRT'); };
    reader.readAsText(file);
  }
});

// ==================== CENTER EDITOR EVENTS ====================
$('btnEditorSave').addEventListener('click', saveCenterEditor);
$('btnEditorDelete').addEventListener('click', () => {
  if (selectedIndex < 0) return;
  saveHistory();
  subtitles.splice(selectedIndex, 1);
  subtitles.forEach((s,i) => s.index = i+1);
  selectedIndex = -1;
  renderSubtitles();
  renderTimeline();
  renderCenterEditor();
  renderTimelineInfo();
  toast('已删除');
});
$('btnEditorSplit').addEventListener('click', () => {
  if (selectedIndex < 0) return;
  saveHistory();
  const sub = subtitles[selectedIndex];
  const mid = Math.round((sub.start + sub.end) / 2);
  const half = Math.ceil(sub.text.length / 2);
  const newSub = {index: selectedIndex+2, start: mid, end: sub.end, text: sub.text.slice(half)};
  sub.end = mid; sub.text = sub.text.slice(0, half);
  subtitles.splice(selectedIndex+1, 0, newSub);
  subtitles.forEach((s,i) => s.index = i+1);
  renderSubtitles();
  renderTimeline();
  renderCenterEditor();
  renderTimelineInfo();
  toast('已拆分');
});
$('btnEditorVerify').addEventListener('click', () => { openVerifyModal(); });

// 时间轴交互
var isDragging = false, dragStartX = 0, dragStartPan = 0;

waveformCanvas.addEventListener('click', function(e) {
  var rect = waveformCanvas.getBoundingClientRect();
  var x = e.clientX - rect.left;
  var maxEnd = Math.max.apply(null, subtitles.map(function(s){ return s.end; }).concat(duration*1000||0));
  if (!maxEnd) return;
  var contentWidth = rect.width * zoom;
  var ms = ((x + panOffset) / contentWidth) * maxEnd;
  playOffset = ms;
  if (isPlaying) {
    playStartTime = Date.now();
    if (audioSource) { try { audioSource.stop(); } catch(e) {} }
    audioSource = audioCtx.createBufferSource();
    audioSource.buffer = audioBuffer;
    audioSource.connect(audioCtx.destination);
    audioSource.start(0, ms/1000);
  }
  renderTimeline();
});

waveformCanvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  var rect = waveformCanvas.getBoundingClientRect();
  var x = e.clientX - rect.left;
  var zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
  var oldZoom = zoom;
  zoom = Math.max(0.1, Math.min(10, zoom * zoomFactor));
  panOffset = x * (zoom - oldZoom) + panOffset;
  panOffset = Math.max(0, panOffset);
  renderTimeline();
}, { passive: false });

waveformCanvas.addEventListener('mousedown', function(e) {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartPan = panOffset;
  waveformCanvas.style.cursor = 'grabbing';
});

document.addEventListener('mousemove', function(e) {
  if (!isDragging) return;
  var dx = e.clientX - dragStartX;
  panOffset = Math.max(0, dragStartPan - dx);
  renderTimeline();
});

document.addEventListener('mouseup', function() {
  isDragging = false;
  waveformCanvas.style.cursor = 'default';
});
function extractWaveform(buffer) {
  var channelData = buffer.getChannelData(0);
  var targetPoints = 2000;
  var samplesPerPoint = Math.floor(channelData.length / targetPoints);
  var data = [];
  for (var i = 0; i < targetPoints; i++) {
    var max = 0;
    var start = i * samplesPerPoint;
    var end = Math.min(start + samplesPerPoint, channelData.length);
    for (var j = start; j < end; j++) {
      var v = Math.abs(channelData[j]);
      if (v > max) max = v;
    }
    data.push(max);
  }
  waveformData = data;
}

$('btnTimelinePlay').addEventListener('click', () => { $('btnPlay').click(); });
$('btnTimelineStop').addEventListener('click', () => { $('btnStop').click(); });

// Update timeline current time display
setInterval(() => {
  if (isPlaying && audioBuffer) {
    const elapsed = (Date.now() - playStartTime) + playOffset;
    timelineCurrent.textContent = msToTime(elapsed);
  }
}, 200);

// ==================== KEYBOARD ====================
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'o') { e.preventDefault(); $('fileInput').click(); }
    if (e.key === 's') { e.preventDefault(); $('btnExport').click(); }
    if (e.key === 'z') { e.preventDefault(); undo(); }
    if (e.key === 'y') { e.preventDefault(); redo(); }
  }
  if (e.key === ' ') {
    const tag = document.activeElement?.tagName;
    if (tag !== 'INPUT' && tag !== 'TEXTAREA') { e.preventDefault(); $('btnPlay').click(); }
  }
  if (e.key === 'Delete') {
    if (selectedIndex >= 0 && document.activeElement?.tagName !== 'INPUT' && document.activeElement?.tagName !== 'TEXTAREA') {
      saveHistory(); subtitles.splice(selectedIndex, 1); subtitles.forEach((s,i) => s.index = i+1); selectedIndex = -1; renderSubtitles(); renderTimeline(); renderCenterEditor(); renderTimelineInfo(); toast('已删除');
    }
  }
});

// ==================== INIT ====================
loadStorage();
renderSubtitles();
renderTimeline();
renderCenterEditor();
renderTimelineInfo();

})();
