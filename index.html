<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRT Workbench - 字幕后期处理工作台</title>
<!-- Whisper模型通过动态加载注入 -->
<style>
/* ========== 基础变量 ========== */
:root {
  --bg-primary: #1a1a2e;
  --bg-panel: #16213e;
  --bg-toolbar: #0f3460;
  --bg-timeline: #2d2d44;
  --bg-hover: #2a2a4a;
  --border-color: #3d3d5c;
  --text-primary: #e0e0e0;
  --text-secondary: #a0a0a0;
  --accent: #00d4ff;
  --accent-hover: #33ddff;
  --danger: #ff6b6b;
  --success: #4ecdc4;
  --warning: #f7b731;
  --subtitle-1: #e94560;
  --subtitle-2: #533483;
  --subtitle-3: #0f3460;
  --playhead: #ff3333;
  --grid-line: #3d3d5c;
  --waveform: #00d4ff;
  --waveform-bg: #1a1a2e;
  --glass-bg: rgba(22, 33, 62, 0.95);
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ========== 工具栏 ========== */
.toolbar {
  height: 48px;
  background: var(--bg-toolbar);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
}

.toolbar .logo {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  margin-right: 8px;
  letter-spacing: 0.5px;
}

.toolbar .divider {
  width: 1px;
  height: 24px;
  background: var(--border-color);
  margin: 0 4px;
}

.toolbar button, .file-btn {
  background: var(--bg-panel);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s ease;
}

.toolbar button:hover, .file-btn:hover {
  background: var(--bg-hover);
  border-color: var(--accent);
  color: var(--accent);
}

.toolbar button:active {
  transform: translateY(1px);
}

.toolbar button.danger:hover { border-color: var(--danger); color: var(--danger); }

.toolbar .time-display {
  font-family: 'Consolas', monospace;
  font-size: 14px;
  color: var(--accent);
  background: var(--bg-primary);
  padding: 4px 12px;
  border-radius: 4px;
  border: 1px solid var(--border-color);
  min-width: 120px;
  text-align: center;
}

.toolbar .spacer { flex: 1; }

input[type="file"] { display: none; }

/* ========== 主布局 ========== */
.main-container {
  display: flex;
  height: calc(100vh - 48px - 120px);
  overflow: hidden;
}

/* ========== 左侧面板 - 字幕列表 ========== */
.left-panel {
  width: 380px;
  min-width: 280px;
  max-width: 500px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  resize: horizontal;
  overflow: auto;
}

.panel-header {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-toolbar);
}

.subtitle-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}

.subtitle-item {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-color);
  cursor: pointer;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  transition: background 0.1s;
  font-size: 12px;
}

.subtitle-item:hover { background: var(--bg-hover); }
.subtitle-item.selected { background: rgba(0, 212, 255, 0.1); border-left: 3px solid var(--accent); }
.subtitle-item.active { background: rgba(233, 69, 96, 0.15); }

.subtitle-item .num {
  font-family: 'Consolas', monospace;
  color: var(--text-secondary);
  min-width: 28px;
  font-size: 11px;
  padding-top: 2px;
}

.subtitle-item .time {
  font-family: 'Consolas', monospace;
  color: var(--accent);
  font-size: 10px;
  min-width: 110px;
  white-space: nowrap;
}

.subtitle-item .text {
  flex: 1;
  color: var(--text-primary);
  line-height: 1.5;
  word-break: break-word;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

/* ========== 右侧面板 - 时间轴 ========== */
.right-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg-timeline);
  position: relative;
  overflow: hidden;
}

.timeline-ruler {
  height: 28px;
  background: var(--bg-toolbar);
  border-bottom: 1px solid var(--border-color);
  position: relative;
  overflow: hidden;
}

.timeline-waveform {
  height: 100px;
  background: var(--waveform-bg);
  border-bottom: 1px solid var(--border-color);
  position: relative;
  overflow: hidden;
}

.timeline-subtitles {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 80px;
}

.playhead {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--playhead);
  pointer-events: none;
  z-index: 100;
  box-shadow: 0 0 6px rgba(255, 51, 51, 0.6);
}

.playhead::before {
  content: '';
  position: absolute;
  top: -6px;
  left: -5px;
  width: 0;
  height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 8px solid var(--playhead);
}

/* ========== 底部面板 ========== */
.bottom-panel {
  height: 120px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border-color);
  display: flex;
  padding: 12px 16px;
  gap: 20px;
  flex-shrink: 0;
}

.bottom-section {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.bottom-section .section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.bottom-section .controls-row {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

/* Switch Toggle */
.switch {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-primary);
}

.switch input { display: none; }

.switch .slider {
  width: 36px;
  height: 20px;
  background: var(--border-color);
  border-radius: 10px;
  position: relative;
  transition: background 0.2s;
}

.switch .slider::after {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  background: var(--text-primary);
  border-radius: 50%;
  top: 2px;
  left: 2px;
  transition: transform 0.2s;
}

.switch input:checked + .slider {
  background: var(--accent);
}

.switch input:checked + .slider::after {
  transform: translateX(16px);
  background: white;
}

/* Number Input */
.num-input {
  width: 60px;
  padding: 4px 8px;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  color: var(--text-primary);
  font-size: 12px;
  font-family: 'Consolas', monospace;
}

.num-input:focus {
  outline: none;
  border-color: var(--accent);
}

/* Select */
.select-box {
  padding: 4px 8px;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  color: var(--text-primary);
  font-size: 12px;
  cursor: pointer;
}

.select-box:focus { outline: none; border-color: var(--accent); }

/* ========== 悬浮面板 ========== */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}

.modal-overlay.show { opacity: 1; pointer-events: auto; }

.modal-panel {
  background: var(--glass-bg);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 24px;
  min-width: 400px;
  max-width: 600px;
  max-height: 80vh;
  overflow-y: auto;
  backdrop-filter: blur(12px);
  box-shadow: var(--shadow);
  transform: translateY(10px);
  transition: transform 0.2s ease;
}

.modal-overlay.show .modal-panel { transform: translateY(0); }

.modal-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--accent);
}

.modal-close {
  position: absolute;
  top: 12px;
  right: 16px;
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 20px;
  cursor: pointer;
}

.modal-close:hover { color: var(--danger); }

/* Form elements in modal */
.form-group {
  margin-bottom: 14px;
}

.form-group label {
  display: block;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.form-group input[type="text"],
.form-group textarea,
.form-group input[type="number"] {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 13px;
  font-family: inherit;
}

.form-group input:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--accent);
}

.form-group textarea {
  min-height: 80px;
  resize: vertical;
}

.form-row {
  display: flex;
  gap: 12px;
}

.form-row .form-group { flex: 1; }

/* Buttons */
.btn {
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px solid var(--border-color);
  background: var(--bg-panel);
  color: var(--text-primary);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s ease;
}

.btn:hover { background: var(--bg-hover); border-color: var(--accent); }
.btn-primary { background: var(--accent); color: #1a1a2e; border-color: var(--accent); font-weight: 600; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-danger { border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: white; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

.btn-group {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 16px;
}

/* Term Rules Table */
.rules-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.rules-table th, .rules-table td {
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border-color);
}

.rules-table th {
  color: var(--text-secondary);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
}

.rules-table tr:hover { background: var(--bg-hover); }

.rules-table input[type="text"] {
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  padding: 4px 8px;
  color: var(--text-primary);
  font-size: 12px;
  width: 100%;
}

.rules-table input[type="text"]:focus {
  outline: none;
  border-color: var(--accent);
}

/* Progress Bar */
.progress-bar {
  width: 100%;
  height: 8px;
  background: var(--bg-primary);
  border-radius: 4px;
  overflow: hidden;
  margin: 8px 0;
}

.progress-bar .fill {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.3s ease;
  width: 0%;
}

.progress-text {
  font-size: 12px;
  color: var(--text-secondary);
  text-align: center;
  margin-top: 4px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

/* Tooltip */
.tooltip {
  position: relative;
}

.tooltip::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-toolbar);
  color: var(--text-primary);
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 11px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
  z-index: 200;
  border: 1px solid var(--border-color);
}

.tooltip:hover::after { opacity: 1; }

/* Loading spinner */
.spinner {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border-color);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: inline-block;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-secondary);
  gap: 12px;
}

.empty-state .icon {
  font-size: 48px;
  opacity: 0.3;
}

.empty-state p {
  font-size: 13px;
}

/* Context Menu */
.context-menu {
  position: fixed;
  background: var(--glass-bg);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 6px 0;
  min-width: 160px;
  z-index: 5000;
  backdrop-filter: blur(8px);
  box-shadow: var(--shadow);
}

.context-menu-item {
  padding: 8px 16px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.context-menu-item:hover { background: var(--bg-hover); }

.context-menu-divider {
  height: 1px;
  background: var(--border-color);
  margin: 4px 0;
}

/* ========== 响应式 ========== */
@media (max-width: 900px) {
  .left-panel { width: 280px; min-width: 200px; }
}

/* ========== Canvas 样式 ========== */
canvas {
  display: block;
}

/* Status indicator */
.status-indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
}
.status-indicator.ready { background: var(--success); }
.status-indicator.loading { background: var(--warning); animation: pulse 1s infinite; }
.status-indicator.error { background: var(--danger); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Keyboard hint */
.kbd {
  display: inline-block;
  padding: 2px 6px;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  font-family: 'Consolas', monospace;
  font-size: 11px;
  color: var(--text-secondary);
}

/* Subtitle block on timeline */
.subtitle-block-info {
  position: absolute;
  bottom: 4px;
  left: 4px;
  font-size: 10px;
  color: rgba(255,255,255,0.7);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  pointer-events: none;
}
</style>
</head>
<body>

<!-- ========== 工具栏 ========== -->
<div class="toolbar" id="toolbar">
  <span class="logo">SRT Workbench</span>
  <div class="divider"></div>
  <label class="file-btn tooltip" data-tip="导入SRT字幕文件">
    <span>📄 导入SRT</span>
    <input type="file" id="importSrt" accept=".srt" />
  </label>
  <label class="file-btn tooltip" data-tip="导入音频文件">
    <span>🎵 导入音频</span>
    <input type="file" id="importAudio" accept="audio/*" />
  </label>
  <button id="exportSrt" class="tooltip" data-tip="导出SRT文件">💾 导出</button>
  <div class="divider"></div>
  <button id="playBtn" class="tooltip" data-tip="播放/暂停 (Space)">▶️ 播放</button>
  <button id="stopBtn" class="tooltip" data-tip="停止">⏹️ 停止</button>
  <div class="time-display" id="timeDisplay">00:00:00,000</div>
  <div class="spacer"></div>
  <button id="settingsBtn" class="tooltip" data-tip="设置">⚙️</button>
  <button id="aboutBtn" class="tooltip" data-tip="关于">ℹ️</button>
</div>

<!-- ========== 主体区域 ========== -->
<div class="main-container" id="mainContainer">
  <!-- 左侧面板 -->
  <div class="left-panel" id="leftPanel">
    <div class="panel-header">
      <span>字幕列表</span>
      <span id="subtitleCount" style="font-size:11px;color:var(--text-secondary)">0 条</span>
    </div>
    <div class="subtitle-list" id="subtitleList">
      <div class="empty-state">
        <div class="icon">📝</div>
        <p>导入SRT文件开始编辑</p>
      </div>
    </div>
  </div>

  <!-- 右侧面板 -->
  <div class="right-panel" id="rightPanel">
    <div class="timeline-ruler" id="timelineRuler">
      <canvas id="rulerCanvas"></canvas>
    </div>
    <div class="timeline-waveform" id="timelineWaveform">
      <canvas id="waveformCanvas"></canvas>
    </div>
    <div class="timeline-subtitles" id="timelineSubtitles">
      <canvas id="subtitleCanvas"></canvas>
      <div class="playhead" id="playhead" style="left:0;display:none"></div>
    </div>
  </div>
</div>

<!-- ========== 底部面板 ========== -->
<div class="bottom-panel" id="bottomPanel">
  <div class="bottom-section" style="flex:1">
    <div class="section-title">文本预处理</div>
    <div class="controls-row">
      <label class="switch">
        <input type="checkbox" id="autoSpaceToggle" checked>
        <span class="slider"></span>
        <span>CJK边界加空格</span>
      </label>
      <label class="switch">
        <input type="checkbox" id="termCorrectionToggle" checked>
        <span class="slider"></span>
        <span>术语修正</span>
      </label>
      <button id="manageRulesBtn" class="btn btn-sm">管理规则</button>
    </div>
  </div>

  <div class="bottom-section">
    <div class="section-title">智能断句</div>
    <div class="controls-row">
      <span style="font-size:12px">每行最多</span>
      <input type="number" class="num-input" id="maxCharsInput" value="12" min="5" max="50">
      <span style="font-size:12px">字</span>
      <button id="splitBtn" class="btn btn-sm">执行拆分</button>
    </div>
  </div>

  <div class="bottom-section">
    <div class="section-title">Whisper对齐</div>
    <div class="controls-row">
      <select class="select-box" id="modelSelect">
        <option value="tiny">tiny (快)</option>
        <option value="base">base</option>
        <option value="small">small (准)</option>
      </select>
      <button id="whisperBtn" class="btn btn-sm">开始对齐</button>
      <button id="undoBtn" class="btn btn-sm tooltip" data-tip="撤销 (Ctrl+Z)">↩️ 撤销</button>
      <button id="redoBtn" class="btn btn-sm tooltip" data-tip="重做 (Ctrl+Y)">↪️ 重做</button>
    </div>
  </div>
</div>

<!-- ========== 编辑面板 Modal ========== -->
<div class="modal-overlay" id="editModal">
  <div class="modal-panel" style="position:relative">
    <button class="modal-close" id="editModalClose">&times;</button>
    <div class="modal-title">编辑字幕</div>
    <div class="form-row">
      <div class="form-group">
        <label>开始时间 (ms)</label>
        <input type="number" id="editStartTime" min="0">
      </div>
      <div class="form-group">
        <label>结束时间 (ms)</label>
        <input type="number" id="editEndTime" min="0">
      </div>
    </div>
    <div class="form-group">
      <label>字幕文本</label>
      <textarea id="editText"></textarea>
    </div>
    <div class="btn-group">
      <button id="splitSubtitleBtn" class="btn">拆分</button>
      <button id="deleteSubtitleBtn" class="btn btn-danger">删除</button>
      <button id="saveEditBtn" class="btn btn-primary">保存</button>
    </div>
  </div>
</div>

<!-- ========== 术语规则管理 Modal ========== -->
<div class="modal-overlay" id="rulesModal">
  <div class="modal-panel" style="position:relative;min-width:520px">
    <button class="modal-close" id="rulesModalClose">&times;</button>
    <div class="modal-title">术语规则管理</div>
    <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">
      内置 <span id="builtinCount">0</span> 条规则，自定义 <span id="customCount">0</span> 条规则
    </p>
    <div style="max-height:400px;overflow-y:auto;margin-bottom:12px">
      <table class="rules-table" id="rulesTable">
        <thead>
          <tr>
            <th style="width:30px"><input type="checkbox" id="toggleAllRules"></th>
            <th>匹配规则</th>
            <th>替换为</th>
            <th style="width:50px">操作</th>
          </tr>
        </thead>
        <tbody id="rulesTableBody"></tbody>
      </table>
    </div>
    <div class="form-row" style="margin-bottom:12px">
      <div class="form-group">
        <input type="text" id="newRulePattern" placeholder="匹配文本 (如: iphone)">
      </div>
      <div class="form-group">
        <input type="text" id="newRuleReplacement" placeholder="替换为 (如: iPhone)">
      </div>
      <button id="addRuleBtn" class="btn btn-primary btn-sm" style="margin-top:0">添加</button>
    </div>
    <div class="btn-group">
      <button id="resetRulesBtn" class="btn btn-danger">重置内置规则</button>
      <button id="saveRulesBtn" class="btn btn-primary">保存</button>
    </div>
  </div>
</div>

<!-- ========== Whisper进度 Modal ========== -->
<div class="modal-overlay" id="whisperModal">
  <div class="modal-panel" style="text-align:center;min-width:360px">
    <div class="modal-title">Whisper 语音识别</div>
    <div id="whisperStatus" style="margin:16px 0;font-size:13px;color:var(--text-secondary)">准备中...</div>
    <div class="progress-bar">
      <div class="fill" id="whisperProgress"></div>
    </div>
    <div class="progress-text" id="whisperProgressText">0%</div>
    <div id="whisperModelInfo" style="font-size:11px;color:var(--text-secondary);margin-top:8px"></div>
    <div class="btn-group" style="justify-content:center;margin-top:20px">
      <button id="cancelWhisperBtn" class="btn btn-danger">取消</button>
    </div>
  </div>
</div>

<!-- ========== 关于 Modal ========== -->
<div class="modal-overlay" id="aboutModal">
  <div class="modal-panel" style="text-align:center;max-width:420px">
    <div class="modal-title">SRT Workbench</div>
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;line-height:1.6">
      纯浏览器运行的字幕后期处理工作台<br>
      打开即用，无需安装任何软件
    </p>
    <div style="font-size:12px;color:var(--text-secondary);text-align:left;margin:16px 0;line-height:1.8">
      <b>快捷键：</b><br>
      <span class="kbd">Space</span> 播放/暂停<br>
      <span class="kbd">Ctrl</span>+<span class="kbd">Z</span> 撤销<br>
      <span class="kbd">Ctrl</span>+<span class="kbd">Y</span> 重做<br>
      <span class="kbd">←</span><span class="kbd">→</span> 微调播放头<br>
      <span class="kbd">Enter</span> 编辑选中字幕<br>
      <span class="kbd">Delete</span> 删除选中字幕<br>
      <span class="kbd">Ctrl</span>+滚轮 缩放时间轴
    </div>
    <div class="btn-group" style="justify-content:center">
      <button id="closeAboutBtn" class="btn btn-primary">关闭</button>
    </div>
  </div>
</div>

<!-- ========== 上下文菜单 ========== -->
<div class="context-menu" id="contextMenu" style="display:none">
  <div class="context-menu-item" id="ctxEdit">✏️ 编辑</div>
  <div class="context-menu-item" id="ctxSplit">✂️ 拆分</div>
  <div class="context-menu-divider"></div>
  <div class="context-menu-item" id="ctxDelete" style="color:var(--danger)">🗑️ 删除</div>
</div>

</body>
